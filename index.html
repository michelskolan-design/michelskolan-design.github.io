<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>About Us</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      scroll-behavior: smooth;
    }

    /* HERO SECTION */
    .hero {
      height: 100vh;
      background: url('https://images.unsplash.com/photo-1509356843151-3e7d96241e11?auto=format&fit=crop&w=1600&q=80') center/cover no-repeat;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      position: relative;
    }

    .hero h1 {
      font-size: 60px;
      margin: 0;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.6);
    }

    .hero p {
      font-size: 20px;
      max-width: 600px;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.6);
    }

    /* ARROW */
    .arrow {
      position: absolute;
      bottom: 30px;
      font-size: 40px;
      animation: bounce 1.5s infinite;
      cursor: pointer;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(10px); }
    }

    /* ABOUT SECTION */
    .about {
      padding: 80px 20px;
      background: #111;
      text-align: center;
    }

    .about h2 {
      font-size: 36px;
      margin-bottom: 20px;
    }

    .about p {
      max-width: 700px;
      margin: auto;
      font-size: 18px;
      line-height: 1.6;
      color: #ccc;
    }

    .btn {
      margin-top: 30px;
      padding: 12px 25px;
      background: white;
      color: black;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-weight: bold;
    }

    .btn:hover {
      background: #ddd;
    }
  </style>
</head>

<body>

  <!-- HERO -->
  <div class="hero">
    <h1>Welcome</h1>
    <p>We are a creative team based in Stockholm, building simple and beautiful web experiences.</p>

    <a href="#about" class="arrow">⬇</a>
  </div>

  <!-- ABOUT -->
  <div class="about" id="about">
    <h2>About Us</h2>
    <p>
      We are passionate designers and developers focused on creating clean, modern, and user-friendly websites.
      Our mission is to bring ideas to life with simple and elegant design.
    </p>

    <button class="btn" onclick="alert('Thanks for visiting!')">
      Contact Us
    </button>
  </div>

</body>
</html>
